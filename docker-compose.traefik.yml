# docker-compose.traefik.yml
#
# Two supported setups — select one by following the inline comments:
#
#   Public   — VPS / internet-facing server
#              Set ACME_EMAIL in .env; requires public DNS + open ports 80 & 443.
#              Traefik obtains TLS certificates from Let's Encrypt.
#              Use the file as-is.
#
#   Internal — Home lab / LAN / not publicly accessible
#              Leave ACME_EMAIL empty in .env.
#              HTTP only, no TLS, no public domain required.
#              Follow the "Internal setup" comments in this file and in
#              docs/guide/traefik.md to remove the TLS configuration.
#
# Prerequisites:
#   1. Copy .env.traefik.example to .env and fill in all required values.
#   2. Run the OpenClaw onboarding wizard first (see docs/guide/traefik.md).
#
# Usage:
#   docker compose -f docker-compose.traefik.yml up -d

services:

  # ─── Traefik reverse proxy ─────────────────────────────────────────────────
  traefik:
    image: traefik:v3.0
    command:
      # Discover services automatically via the Docker provider
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      # HTTP entry point (used by both setups)
      - "--entrypoints.web.address=:80"
      # ── Public setup only ────────────────────────────────────────────────
      # Redirect HTTP → HTTPS and enable Let's Encrypt TLS.
      # Comment out this block for an internal (HTTP-only) setup.
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      # ─────────────────────────────────────────────────────────────────────
    ports:
      - "80:80"
      # Public setup only: expose HTTPS port.
      # Remove or comment this line for an internal (HTTP-only) setup.
      - "443:443"
    volumes:
      # Read-only Docker socket — Traefik watches containers for routing changes
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Persist TLS certificate data across container restarts (public setup)
      - traefik-certs:/letsencrypt
    restart: unless-stopped
    networks:
      - proxy

  # ─── OpenClaw gateway ──────────────────────────────────────────────────────
  # The AI agent gateway. Complete the onboarding wizard before running this
  # compose file (see docs/guide/traefik.md for step-by-step instructions).
  openclaw-gateway:
    image: alpine/openclaw:latest
    user: "1000:1000"
    volumes:
      # Agent config, memory, sessions, and logs (written by OpenClaw)
      - ~/.openclaw:/home/node/.openclaw
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      # Route ${OPENCLAW_DOMAIN} → OpenClaw gateway (port 18789)
      # Public setup: use websecure (HTTPS) entry point with TLS cert resolver
      - "traefik.http.routers.openclaw.rule=Host(`${OPENCLAW_DOMAIN}`)"
      - "traefik.http.routers.openclaw.entrypoints=websecure"
      - "traefik.http.routers.openclaw.tls.certresolver=letsencrypt"
      # Internal setup: replace the two lines above with the line below (HTTP only)
      # - "traefik.http.routers.openclaw.entrypoints=web"
      - "traefik.http.services.openclaw.loadbalancer.server.port=18789"
    restart: unless-stopped
    networks:
      - proxy
      - internal
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  # ─── ClawMetry dashboard ───────────────────────────────────────────────────
  clawmetry:
    image: stritti/clawmetry:latest
    volumes:
      # Mount the OpenClaw workspace read-only so the dashboard can read logs,
      # sessions, memory files, and metrics — without modifying agent data.
      - ~/.openclaw:/home/clawmetry/.openclaw:ro
    environment:
      OPENCLAW_DATA_DIR: /home/clawmetry/.openclaw
      # Optional: your display name in the Flow tab
      OPENCLAW_USER: "${OPENCLAW_USER:-}"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      # Route ${CLAWMETRY_DOMAIN} → ClawMetry dashboard (port 8900)
      # Public setup: use websecure (HTTPS) entry point with TLS cert resolver
      - "traefik.http.routers.clawmetry.rule=Host(`${CLAWMETRY_DOMAIN}`)"
      - "traefik.http.routers.clawmetry.entrypoints=websecure"
      - "traefik.http.routers.clawmetry.tls.certresolver=letsencrypt"
      # Internal setup: replace the two lines above with the line below (HTTP only)
      # - "traefik.http.routers.clawmetry.entrypoints=web"
      - "traefik.http.services.clawmetry.loadbalancer.server.port=8900"
    restart: unless-stopped
    networks:
      - proxy
      - internal

volumes:
  # Persists Traefik TLS certificates across container restarts
  traefik-certs:

networks:
  # External-facing network shared with Traefik
  proxy:
  # Container-to-container communication only — no direct internet access
  internal:
    internal: true
