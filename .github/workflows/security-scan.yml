name: Security Scan

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - '.github/workflows/security-scan.yml'
  pull_request:
    paths:
      - 'Dockerfile'
      - '.github/workflows/security-scan.yml'
  schedule:
    # Run weekly on Mondays at 07:00 UTC
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  trivy-scan:
    name: Trivy CVE Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: clawmetry:scan

      - name: Run Trivy vulnerability scan on Docker image
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: clawmetry:scan
          format: sarif
          output: trivy-image-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Upload Trivy image scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image

      - name: Run Trivy vulnerability scan on Dockerfile (misconfiguration)
        if: always()
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: config
          scan-ref: Dockerfile
          format: sarif
          output: trivy-config-results.sarif
          exit-code: '1'

      - name: Upload Trivy config scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-config-results.sarif
          category: trivy-config
