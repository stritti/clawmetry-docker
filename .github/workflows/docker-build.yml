name: Docker Build and Push

on:
  push:
    branches:
      - main
  schedule:
    # Check daily at 06:00 UTC for new clawmetry releases
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      version:
        description: 'Clawmetry version to build (leave empty to use latest from PyPI)'
        required: false
        default: ''

env:
  GHCR_REGISTRY: ghcr.io
  DOCKERHUB_IMAGE: stritti/clawmetry

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get clawmetry version
        id: pypi
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
            echo "Using manually specified version: $VERSION"
          else
            VERSION=$(curl -sf https://pypi.org/pypi/clawmetry/json | python3 -c "import sys, json; print(json.load(sys.stdin)['info']['version'])")
            if [ -z "$VERSION" ]; then
              echo "Failed to fetch clawmetry version from PyPI" >&2
              exit 1
            fi
            echo "Using latest version from PyPI: $VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Check if version already exists in GHCR
        id: check_ghcr
        run: |
          IMAGE="${{ env.GHCR_REGISTRY }}/${{ github.repository }}:${{ steps.pypi.outputs.version }}"
          if docker manifest inspect "$IMAGE" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Image $IMAGE already exists in GHCR – skipping GHCR push."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Image $IMAGE not found in GHCR – will build and push."
          fi

      - name: Check if version already exists in Docker Hub
        id: check_dockerhub
        run: |
          IMAGE="${{ env.DOCKERHUB_IMAGE }}:${{ steps.pypi.outputs.version }}"
          if docker manifest inspect "$IMAGE" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Image $IMAGE already exists in Docker Hub – skipping Docker Hub push."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Image $IMAGE not found in Docker Hub – will build and push."
          fi

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        if: steps.check_ghcr.outputs.exists == 'false' || steps.check_dockerhub.outputs.exists == 'false' || github.event_name == 'workflow_dispatch'
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_REGISTRY }}/${{ github.repository }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.pypi.outputs.version }}

      - name: Build and push Docker image
        if: steps.check_ghcr.outputs.exists == 'false' || steps.check_dockerhub.outputs.exists == 'false' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CLAWMETRY_VERSION=${{ steps.pypi.outputs.version }}
